<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Pilot - AI Chatbot</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #1b2b5a, #0f1e3f);
      color: #fff;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(15, 30, 63, 0.95);
      padding: 18px 50px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .center-links {
      display: flex;
      gap: 35px;
      list-style: none;
    }

    .center-links li {
      cursor: pointer;
    }

    .chat-container {
      max-width: 800px;
      margin: 50px auto;
      background-color: #213a56;
      border-radius: 15px;
      padding: 20px;
      height: 70vh;
      display: flex;
      flex-direction: column;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      background-color: #0f1e3f;
      padding: 10px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
    }

    .message {
      padding: 10px 15px;
      margin: 8px 0;
      border-radius: 15px;
      max-width: 70%;
      white-space: pre-line;
    }

    .user {
      background: #CDAA80;
      color: black;
      align-self: flex-end;
    }

    .bot {
      background: rgba(255,255,255,0.1);
      align-self: flex-start;
    }

    .typing span {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin: 2px;
      background: white;
      border-radius: 50%;
      animation: blink 1.4s infinite;
    }

    .typing span:nth-child(2){ animation-delay:0.2s;}
    .typing span:nth-child(3){ animation-delay:0.4s;}

    @keyframes blink {
      0%,80%,100%{opacity:0.2;}
      40%{opacity:1;}
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 25px;
      border: none;
    }

    .input-area button {
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      background: #CDAA80;
      cursor: pointer;
    }
  </style>
</head>

<body>

<script>
const user = localStorage.getItem("careerpilotUser");
if (!user) {
  window.location.replace("signinlogin.html#login");
}
</script>

<!-- ✅ NAVBAR UPDATED -->
<nav>
  <a href="home.html">Career Pilot</a>

  <ul class="center-links">
    <li onclick="goIfLoggedIn('dashboard.html')">Dashboard</li>
    <!-- ❌ AI Chatbot removed -->
    <li onclick="goIfLoggedIn('roadmap.html')">Roadmaps</li>
    <li onclick="goIfLoggedIn('pagecourse.html')">Courses</li>
  </ul>
</nav>

<div class="chat-container">
  <div class="chat-window" id="chatWindow"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask me about your career or skills..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
function goIfLoggedIn(page) {
  const user = localStorage.getItem("careerpilotUser");
  if (user) window.location.href = page;
  else window.location.href = "signinlogin.html#login";
}

const sendBtn = document.getElementById('sendBtn');
const userInput = document.getElementById('userInput');
const chatWindow = document.getElementById('chatWindow');

const currentUser = JSON.parse(localStorage.getItem("careerpilotUser"));
const chatKey = "chatHistory_" + (currentUser?.email || "guest");
const chatCountKey = "chatCount_" + (currentUser?.email || "guest");

let history = JSON.parse(localStorage.getItem(chatKey)) || [];
let chatCount = parseInt(localStorage.getItem(chatCountKey)) || 0;

function saveHistory() {
  localStorage.setItem(chatKey, JSON.stringify(history));
}

function loadHistory() {
  history.forEach(m => appendMessage(m.text, m.type, false));
}

function appendMessage(text, type, save=true) {
  const div = document.createElement('div');
  div.className = "message " + type;
  div.textContent = text;
  chatWindow.appendChild(div);

  chatWindow.scrollTop = chatWindow.scrollHeight;

  if (save) {
    history.push({ text, type });
    saveHistory();
  }
}

function showTyping() {
  const div = document.createElement('div');
  div.className = "message bot typing";
  div.id = "typing";
  div.innerHTML = `<span></span><span></span><span></span>`;
  chatWindow.appendChild(div);
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

function typeMessage(text) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    div.className = "message bot";
    chatWindow.appendChild(div);

    let i = 0;
    function typing() {
      if (i < text.length) {
        div.textContent += text[i++];
        chatWindow.scrollTop = chatWindow.scrollHeight;
        setTimeout(typing, 15);
      } else {
        history.push({ text, type: "bot" });
        saveHistory();
        resolve();
      }
    }
    typing();
  });
}

async function botResponse(msg) {
  try {
    const res1 = await fetch('http://127.0.0.1:5000/career-predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_input: msg })
    });

    const data1 = await res1.json();
    const roles = data1.prediction;

    const res2 = await fetch(`http://127.0.0.1:5000/recommend?query=${encodeURIComponent(roles)}`);
    const data2 = await res2.json();

    let coursesText = "";

    if (data2.recommendations?.length) {
      coursesText = "\n\n📚 Courses:\n";
      data2.recommendations.slice(0,3).forEach(c=>{
        coursesText += "• " + c["Title of Course"] + "\n";
      });
    }

    return `🎯 Suggested Roles:\n${roles}${coursesText}`;

  } catch {
    return "Error connecting to server.";
  }
}

async function sendMessage() {
  const msg = userInput.value.trim();
  if (!msg) return;

  appendMessage(msg, "user");
  userInput.value = "";

  chatCount++;
  localStorage.setItem(chatCountKey, chatCount);

  showTyping();
  const reply = await botResponse(msg);
  removeTyping();

  await typeMessage(reply);
}

sendBtn.addEventListener('click', sendMessage);

userInput.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

window.addEventListener('load', () => {
  loadHistory();

  if (history.length === 0) {
    appendMessage("Hello! Tell me your skills or interests.", "bot");
  }
});

window.addEventListener("load", () => {
  const params = new URLSearchParams(window.location.search);
  const query = params.get("query");

  if (query) {
    userInput.value = "Give me roadmap, skills and courses for " + query;
    setTimeout(sendMessage, 300);
  }
});
</script>

</body>
</html>
