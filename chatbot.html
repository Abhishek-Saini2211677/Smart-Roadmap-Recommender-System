<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Pilot - AI Chatbot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ❌ NO CHANGE IN CSS */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1b2b5a, #0f1e3f);
  color: #fff;
}
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: rgba(15, 30, 63, 0.95);
  padding: 18px 50px;
}
nav a {
  color: #fff;
  text-decoration: none;
  font-size: 1.8rem;
  font-weight: 700;
}
.center-links {
  display: flex;
  gap: 35px;
  list-style: none;
}
.center-links li { cursor: pointer; }
.chat-container {
  max-width: 800px;
  margin: 50px auto;
  background-color: #213a56;
  border-radius: 15px;
  padding: 20px;
  height: 70vh;
  display: flex;
  flex-direction: column;
}
.chat-heading {
  text-align: center;
  font-weight: 600;
  margin-bottom: 10px;
  color: #CDAA80;
}
.chat-window {
  flex: 1;
  overflow-y: auto;
  background-color: #0f1e3f;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
}
.message {
  padding: 10px 15px;
  margin: 8px 0;
  border-radius: 15px;
  max-width: 70%;
  white-space: pre-line;
}
.message.user::before { content: "👤 "; }
.message.bot::before { content: "🤖 "; }
.user {
  background: #CDAA80;
  color: black;
  align-self: flex-end;
}
.bot {
  background: rgba(255,255,255,0.1);
  align-self: flex-start;
}
.input-area {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}
.input-area input {
  flex: 1;
  padding: 10px;
  border-radius: 25px;
  border: none;
}
.send-btn {
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  background: #CDAA80;
  cursor: pointer;
}
.delete-btn {
  padding: 10px 15px;
  border-radius: 25px;
  border: none;
  background: #ff6b6b;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<script>
const user = sessionStorage.getItem("careerpilotUser");
if (!user) window.location.replace("signinlogin.html#login");
</script>

<nav>
  <a href="home.html">Career Pilot</a>
  <ul class="center-links">
    <li onclick="goIfLoggedIn('dashboard.html')">Dashboard</li>
    <li onclick="goIfLoggedIn('roadmap.html')">Roadmaps</li>
    <li onclick="goIfLoggedIn('pagecourse.html')">Courses</li>
  </ul>
</nav>

<div class="chat-container">
  <div class="chat-heading">🤖 Career AI Assistant</div>
  <div class="chat-window" id="chatWindow"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask me about your career or skills..." />
    <button id="sendBtn" class="send-btn">Send</button>
    <button onclick="clearChat()" class="delete-btn">🗑</button>
  </div>
</div>

<script>

function goIfLoggedIn(page) {
  const user = sessionStorage.getItem("careerpilotUser");
  window.location.href = user ? page : "signinlogin.html#login";
}

const currentUser = JSON.parse(sessionStorage.getItem("careerpilotUser"));

function increaseChatCount() {
  const key = "chatCount_" + (currentUser?.email || "guest");
  let count = parseInt(localStorage.getItem(key)) || 0;
  localStorage.setItem(key, count + 1);
}

const sendBtn = document.getElementById('sendBtn');
const userInput = document.getElementById('userInput');
const chatWindow = document.getElementById('chatWindow');

const chatKey = "chatHistory_" + (currentUser?.email || "guest");

let history = JSON.parse(localStorage.getItem(chatKey)) || [];

function autoScroll() {
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function clearChat() {
  localStorage.removeItem(chatKey);
  chatWindow.innerHTML = "";
  history = [];
}

function appendMessage(text, type, save=true) {
  const div = document.createElement('div');
  div.className = "message " + type;
  div.textContent = text;
  chatWindow.appendChild(div);

  if (save) {
    history.push({ text, type });
    localStorage.setItem(chatKey, JSON.stringify(history));
  }
}

function loadHistory() {
  history.forEach(m => appendMessage(m.text, m.type, false));
}

function typeMessage(text) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    div.className = "message bot";
    chatWindow.appendChild(div);

    let i = 0;
    function typing() {
      if (i < text.length) {
        div.textContent += text[i++];
        autoScroll();
        setTimeout(typing, 10);
      } else {
        history.push({ text, type: "bot" });
        localStorage.setItem(chatKey, JSON.stringify(history));
        resolve();
      }
    }
    typing();
  });
}

/* ✅ UPDATED DOMAIN DETECTION */
function detectDomain(text) {
  if (text.includes("java") || text.includes("spring"))
    return "java";

  if (text.includes("web") || text.includes("html") || text.includes("css") || text.includes("javascript"))
    return "web";

  if (text.includes("data"))
    return "data";

  if (text.includes("ai") || text.includes("ml"))
    return "ai";

  if (text.includes("android") || text.includes("kotlin"))
    return "android";

  if (text.includes("cyber") || text.includes("security"))
    return "cyber";

  if (text.includes("cloud") || text.includes("aws"))
    return "cloud";

  return null;
}

/* ✅ UPDATED RESPONSES */
function getResponse(domain) {

  if (domain === "java")
    return `🚀 Based on your interest, I recommend becoming a Java Developer, Backend Developer, Spring Boot Developer.

Here’s your next step:
✔ Learn Core Java
✔ Learn Spring Boot
✔ Build backend projects

Ready to start? 😎

📚 Top Courses:
• Java Programming Masterclass
• Spring Boot Fundamentals
• Java Backend Development`;

  if (domain === "web")
    return `🚀 Based on your interest, I recommend becoming a Frontend Developer, Backend Developer, Full Stack Developer.

Here’s your next step:
✔ Learn fundamentals
✔ Build projects
✔ Practice

Ready to start? 😎

📚 Top Courses:
• Meta Front-End Developer
• Responsive Web Design
• Full Stack Web Development`;

  if (domain === "data")
    return `🚀 Based on your interest, I recommend becoming a Data Analyst, Data Scientist, Business Intelligence Analyst, Data Engineer.

Here’s your next step:
✔ Learn fundamentals
✔ Build projects
✔ Practice

Ready to start? 😎

📚 Top Courses:
• Google Data Analytics Professional Certificate
• AI For Business Specialization
• Business Analyst with SQL and Tableau`;

  if (domain === "ai")
    return `🚀 Based on your interest, I recommend becoming a AI Engineer, Machine Learning Engineer, Data Scientist.

Here’s your next step:
✔ Learn fundamentals
✔ Build projects
✔ Practice

Ready to start? 😎

📚 Top Courses:
• Machine Learning Specialization
• Deep Learning Specialization
• Mathematics for Machine Learning`;

  if (domain === "android")
    return `🚀 Based on your interest, I recommend becoming a Android Developer, Mobile App Developer.

Here’s your next step:
✔ Learn fundamentals
✔ Build projects
✔ Practice

Ready to start? 😎

📚 Top Courses:
• Android Kotlin Masterclass
• Android App Development Specialization
• Flutter Development`;

  if (domain === "cyber")
    return `🚀 Based on your interest, I recommend becoming a Cyber Security Analyst, Ethical Hacker, Penetration Tester.

Here’s your next step:
✔ Learn fundamentals
✔ Build projects
✔ Practice

Ready to start? 😎

📚 Top Courses:
• Cyber Security Fundamentals
• Ethical Hacking Course
• Network Security`;

  if (domain === "cloud")
    return `🚀 Based on your interest, I recommend becoming a Cloud Engineer, DevOps Engineer, AWS Engineer.

Here’s your next step:
✔ Learn fundamentals
✔ Build projects
✔ Practice

Ready to start? 😎

📚 Top Courses:
• AWS Solutions Architect
• Google Cloud Certification
• Cloud Computing Basics`;

  return null;
}

async function botResponse(msg) {
  const text = msg.toLowerCase().trim();

  if (["hi","hello","hey"].includes(text)) {
    return "👋 Hey! Tell me your interest like web, AI, data science and I’ll guide you 🚀";
  }

  const domain = detectDomain(text);

  if (!domain) {
    return "❌ Please ask about career domains like web, java, data science, AI/ML, android, cyber security, cloud.";
  }

  return getResponse(domain);
}

async function sendMessage() {
  const msg = userInput.value.trim();
  if (!msg) return;

  appendMessage(msg, "user");
  userInput.value = "";

  increaseChatCount();

  const reply = await botResponse(msg);
  await typeMessage(reply);
}

sendBtn.onclick = sendMessage;
userInput.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

window.onload = () => {
  loadHistory();

  if (history.length === 0) {
    appendMessage("👋 Hello! Tell me your skills.", "bot");
  }

  const params = new URLSearchParams(window.location.search);
  const query = params.get("query") || params.get("role");

  if (query) {
    userInput.value = "Give roadmap for " + query;

    setTimeout(() => {
      sendMessage();
    }, 800);
  }
};
</script>

</body>
</html>
