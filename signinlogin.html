<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CareerPilot - Auth</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: white;
      background: linear-gradient(135deg, #0F1E3F, #213A56);
    }

    nav {
      width: 100%;
      padding: 15px 30px;
      background-color: #213a56;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #fff;
    }

    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-card {
      background-color: #ffffff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 100%;
      text-align: center;
      color: #0F1E3F;
      margin-top: 100px;
    }

    .auth-card h2 {
      margin-bottom: 20px;
      font-size: 1.8rem;
      font-weight: 600;
    }

    .form-group {
      text-align: left;
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #213A56;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      font-size: 0.95rem;
      color: #0F1E3F;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s ease;
    }

    .login-btn {
      background: #CDAA80;
      color: #213A56;
    }

    .login-btn:hover {
      background: #997953;
      color: white;
    }

    .redirect-text {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #213A56;
    }

    .redirect-text span {
      color: #CDAA80;
      font-weight: 600;
      cursor: pointer;
    }

    .redirect-text span:hover {
      color: #997953;
    }
  </style>
</head>

<body>

<nav>
  <a href="about.html" style="text-decoration: none; color: inherit;">
    <div class="logo">CareerPilot</div>
  </a>
</nav>

<div class="auth-container">
  <div class="auth-card">

    <!-- LOGIN -->
    <div id="loginPage">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" required />
        </div>

        <button type="submit" class="btn login-btn">Login</button>
      </form>

      <p class="redirect-text">
        Don’t have an account? <span onclick="showSignin()">Sign Up</span>
      </p>
    </div>

    <!-- SIGNUP -->
    <div id="signinPage" style="display:none;">
      <h2>Sign Up</h2>
      <form id="signinForm">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="name" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signinEmail" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signinPassword" required />
        </div>

        <button type="submit" class="btn login-btn">Sign Up</button>
      </form>

      <p class="redirect-text">
        Already have an account? <span onclick="showLogin()">Login</span>
      </p>
    </div>

  </div>
</div>

<script>
// Toggle UI
function showSignin() {
  loginPage.style.display = "none";
  signinPage.style.display = "block";
}

function showLogin() {
  signinPage.style.display = "none";
  loginPage.style.display = "block";
}

// Load tab
window.onload = () => {
  if (location.hash === "#signup") showSignin();
};

/* Gmail validation */
function isValidGmail(email) {
  const regex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
  return regex.test(email);
}

/* Storage */
function getUsers() {
  return JSON.parse(localStorage.getItem("careerpilotUsers")) || [];
}

function saveUsers(users) {
  localStorage.setItem("careerpilotUsers", JSON.stringify(users));
}

/* Signup */
signinForm.onsubmit = (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = signinEmail.value.toLowerCase();
  const password = signinPassword.value;

  if (!isValidGmail(email)) {
    alert("❌ Only Gmail allowed (example@gmail.com)");
    return;
  }

  let users = getUsers();

  if (users.find(u => u.email === email)) {
    alert("User already exists ❌");
    return;
  }

  users.push({ name, email, password });
  saveUsers(users);

  alert("Signup success ✅");
  showLogin();
};

/* Login */
loginForm.onsubmit = (e) => {
  e.preventDefault();

  const email = loginEmail.value.toLowerCase();
  const password = loginPassword.value;

  if (!isValidGmail(email)) {
    alert("❌ Enter valid Gmail only");
    return;
  }

  const users = getUsers();
  const user = users.find(u => u.email === email && u.password === password);

  if (user) {
    sessionStorage.setItem("careerpilotUser", JSON.stringify(user));
    sessionStorage.setItem("isLoggedIn", "true");

    alert("Login success 🎉");
    location.href = "home.html";
  } else {
    alert("Invalid credentials ❌");
  }
};
</script>

</body>
</html>
