<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Pilot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1b2b5a, #0f1e3f);
  color: #fff;
}

/* ===== NAVBAR ===== */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 50px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.brand a {
  text-decoration: none;
  color: #fff;
  font-size: 1.7rem;
  font-weight: 700;
}

.center-links {
  display: flex;
  gap: 25px;
  list-style: none;
}

.center-links li {
  cursor: pointer;
  transition: 0.3s;
  position: relative;
}

.center-links li::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  background: #CDAA80;
  bottom: -4px;
  left: 0;
  transition: 0.3s;
}

.center-links li:hover::after {
  width: 100%;
}

.center-links li:hover {
  color: #CDAA80;
}

/* AUTH BUTTONS */
.auth-buttons {
  display: flex;
  gap: 10px;
}

.auth-buttons button {
  padding: 8px 18px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
}

.login-btn {
  background: transparent;
  border: 1px solid #CDAA80;
  color: #CDAA80;
}

.signup-btn {
  background: linear-gradient(135deg,#CDAA80,#997953);
  color: #0F1E3F;
}

.signup-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #CDAA80;
}

/* ===== HERO ===== */
.hero {
  min-height: calc(100vh - 70px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  width: 350px;
  height: 350px;
  background: #CDAA80;
  filter: blur(150px);
  top: 40px;
  opacity: 0.3;
}

.hero h1 {
  font-size: 3.2rem;
  line-height: 1.3;
}

.hero span {
  color: #CDAA80;
}

.hero p {
  max-width: 600px;
  opacity: 0.85;
  margin-top: 10px;
}

/* CTA */
.hero button {
  margin-top: 25px;
  padding: 14px 35px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg,#CDAA80,#997953);
  color: #0F1E3F;
  cursor: pointer;
  transition: 0.3s;
}

.hero button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #CDAA80;
}

/* ===== FEATURES ===== */
.features {
  padding: 70px 50px;
  text-align: center;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 25px;
  margin-top: 40px;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 30px;
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.08);
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.card i {
  font-size: 2.2rem;
  color: #CDAA80;
  margin-bottom: 10px;
}

.card h3 {
  margin: 10px 0;
}

.card button {
  margin-top: 12px;
  padding: 8px 18px;
  border-radius: 20px;
  border: none;
  background: #CDAA80;
  color: #0F1E3F;
  cursor: pointer;
  transition: 0.3s;
}

.card button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="brand">
    <a href="home.html"><i class="fas fa-compass"></i> Career Pilot</a>
  </div>

  <ul class="center-links">
    <li onclick="goProtected('dashboard.html')">Dashboard</li>
    <li onclick="goProtected('chatbot.html')">AI Chatbot</li>
    <li onclick="goProtected('roadmap.html')">Roadmaps</li>
    <li onclick="goProtected('pagecourse.html')">Courses</li>
  </ul>

  <div class="auth-buttons" id="authArea">
    <button class="login-btn" onclick="goLogin()">Login</button>
    <button class="signup-btn" onclick="goSignup()">Sign Up</button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Build Your Career with <br><span>AI Guidance</span></h1>
  <p>Smart suggestions, structured roadmaps, and powerful learning tools.</p>
  <button onclick="startJourney()">Start Journey 🚀</button>
</section>

<!-- FEATURES -->
<section class="features">
  <h2>Explore Features</h2>

  <div class="cards">

    <!-- NEW DASHBOARD CARD -->
    <div class="card">
      <i class="fas fa-chart-line"></i>
      <h3>Dashboard</h3>
      <button onclick="goProtected('dashboard.html')">Open</button>
    </div>

    <div class="card">
      <i class="fas fa-robot"></i>
      <h3>AI Chatbot</h3>
      <button onclick="goProtected('chatbot.html')">Open</button>
    </div>

    <div class="card">
      <i class="fas fa-project-diagram"></i>
      <h3>Roadmaps</h3>
      <button onclick="goProtected('roadmap.html')">Explore</button>
    </div>

    <div class="card">
      <i class="fas fa-book"></i>
      <h3>Courses</h3>
      <button onclick="goProtected('pagecourse.html')">View</button>
    </div>

  </div>
</section>

<script>
// 🔐 PROTECTION
function goProtected(page) {
  const user = localStorage.getItem("careerpilotUser");

  if (user) {
    window.location.href = page;
  } else {
    alert("Please login first!");
    window.location.href = "signinlogin.html#login";
  }
}

function goLogin() {
  window.location.href = "signinlogin.html#login";
}

function goSignup() {
  window.location.href = "signinlogin.html#signup";
}

function startJourney() {
  goProtected("about.html");
}

// 👤 USER DISPLAY
window.addEventListener("load", () => {
  const user = JSON.parse(localStorage.getItem("careerpilotUser"));

  if (user) {
    document.getElementById("authArea").innerHTML = `
      <span style="margin-right:10px;">Hi, ${user.name}</span>
      <button onclick="logout()">Logout</button>
    `;
  }
});

// 🚪 LOGOUT
function logout() {
  localStorage.removeItem("careerpilotUser");
  localStorage.removeItem("chatHistory");
  window.location.href = "signinlogin.html#login";
}
</script>

</body>
</html>
