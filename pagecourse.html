<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Pilot - Courses</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1b2b5a, #0f1e3f);
  color: #fff;
}

/* Glow */
body::before {
  content: "";
  position: fixed;
  width: 300px;
  height: 300px;
  background: #CDAA80;
  filter: blur(140px);
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0.25;
  z-index: 0;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 18px 50px;
  background: rgba(0,0,0,0.4);
  position: relative;
  z-index: 1;
}

nav a {
  color: #fff;
  text-decoration: none;
  font-size: 1.5rem;
  font-weight: 600;
}

.center-links {
  display: flex;
  gap: 25px;
}

.center-links span {
  cursor: pointer;
  transition: 0.3s;
}

.center-links span:hover {
  color: #CDAA80;
  transform: translateY(-2px);
}

/* Content */
.content {
  padding: 40px;
  max-width: 1200px;
  margin: auto;
  position: relative;
  z-index: 1;
}

h2 {
  margin-bottom: 20px;
}

/* Search */
.search-container {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
}

.search-container input {
  flex: 1;
  padding: 12px;
  border-radius: 25px;
  border: none;
  font-size: 1rem;
}

/* Button */
.search-container button {
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: #CDAA80;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.search-container button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(205,170,128,0.6);
}

/* Grid */
.courses-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 20px;
}

/* Card */
.course-card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 20px;
  color: #fff;
  transition: all 0.35s ease;
}

.course-card:hover {
  transform: translateY(-10px) scale(1.02);
}

.course-card a {
  display: inline-block;
  margin-top: 10px;
  color: #CDAA80;
  font-weight: bold;
  text-decoration: none;
}

.status {
  margin-top: 20px;
  opacity: 0.8;
}
</style>
</head>

<body>

<script>
const user = localStorage.getItem("careerpilotUser");
if (!user) {
  window.location.replace("signinlogin.html#login");
}
</script>

<nav>
  <a href="home.html">Career Pilot</a>

  <div class="center-links">
    <!-- ✅ ADDED DASHBOARD -->
    <span onclick="go('dashboard.html')">Dashboard</span>
    <span onclick="go('chatbot.html')">Chatbot</span>
    <span onclick="go('roadmap.html')">Roadmaps</span>
  </div>
</nav>

<div class="content">
  <h2>📚 Recommended Courses</h2>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Enter role or skill..." />
    <button id="searchBtn">Search</button>
  </div>

  <div id="status" class="status"></div>

  <div class="courses-grid" id="coursesGrid"></div>
</div>

<script>
function go(page) {
  window.location.href = page;
}

const input = document.getElementById("searchInput");
const btn = document.getElementById("searchBtn");
const grid = document.getElementById("coursesGrid");
const status = document.getElementById("status");

/* ✅ USER KEY */
const currentUser = JSON.parse(localStorage.getItem("careerpilotUser"));
const courseKey = "courseCount_" + (currentUser?.email || "guest");

let courseCount = parseInt(localStorage.getItem(courseKey)) || 0;

/* ✅ TRACK COURSE VIEW */
function trackCourseClick() {
  courseCount++;
  localStorage.setItem(courseKey, courseCount);
}

async function fetchCourses(query) {
  if (!query) return;

  grid.innerHTML = "";
  status.innerText = "⏳ Loading courses...";

  try {
    const res = await fetch(`http://127.0.0.1:5000/recommend?query=${encodeURIComponent(query)}`);
    const data = await res.json();

    if (!data.recommendations || data.recommendations.length === 0) {
      status.innerText = "❌ No courses found";
      return;
    }

    status.innerText = `Showing results for "${query}"`;

    data.recommendations.forEach(course => {
      const div = document.createElement("div");
      div.className = "course-card";

      div.innerHTML = `
        <h3>${course["Title of Course"]}</h3>
        <p><strong>Skills:</strong> ${course["Skills"]}</p>
        <p><strong>Platform:</strong> ${course["Platform"]}</p>
        <a href="${course["URL"]}" target="_blank" onclick="trackCourseClick()">View Course →</a>
      `;

      grid.appendChild(div);
    });

  } catch (error) {
    console.error(error);
    status.innerText = "⚠️ Server error. Try again.";
  }
}

btn.addEventListener("click", () => {
  fetchCourses(input.value.trim());
});

input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    fetchCourses(input.value.trim());
  }
});

window.addEventListener("load", () => {
  const params = new URLSearchParams(window.location.search);
  const query = params.get("query");

  if (query) {
    input.value = query;
    fetchCourses(query);
  }
});
</script>

</body>
</html>
