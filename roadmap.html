<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Pilot - Roadmaps</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1b2b5a, #0f1e3f);
  color: #fff;
}
body::before {
  content: "";
  position: fixed;
  width: 300px;
  height: 300px;
  background: #CDAA80;
  filter: blur(140px);
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0.25;
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 18px 50px;
  background: rgba(0,0,0,0.3);
}

nav a { 
  color:#fff;
  text-decoration:none;
  font-size:1.5rem;
}

.nav-links { 
  display:flex;
  gap:25px;
}

.nav-links span {
  cursor: pointer;
  position: relative;
}

.nav-links span::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0%;
  height: 2px;
  background: #CDAA80;
  transition: width 0.3s ease;
}

.nav-links span:hover::after {
  width: 100%;
}

.nav-links span:hover {
  color: #CDAA80;
}

.container { padding:40px;text-align:center; }
.cards { display:grid;grid-template-columns:repeat(3,1fr);gap:20px; }

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  padding:20px;
  transition: all 0.35s ease;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 
    0 10px 30px rgba(0,0,0,0.4),
    0 0 20px rgba(205,170,128,0.3);
}

.progress { background:#ddd;height:8px;border-radius:10px;overflow:hidden;margin-bottom:15px; }
.progress-bar { background:#CDAA80;height:100%; }

.steps { list-style:none;padding:0; }
.steps li {
  margin:8px 0;
  padding:8px;
  background:#997953;
  border-radius:8px;
  color:#0F1E3F;
  cursor:pointer;
}

.btn-group { margin-top:15px;display:flex;gap:10px; }
.btn { flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer; }

.chat-btn { background:#CDAA80;color:#0F1E3F; }
.course-btn { background:#fff;color:#213A56; }
.reset-btn { background:#ff6b6b;color:#fff; }
</style>
</head>

<body>

<nav>
  <a href="home.html"><i class="fas fa-compass"></i> Career Pilot</a>
  <div class="nav-links">
    <span onclick="go('dashboard.html')">Dashboard</span>
    <span onclick="go('chatbot.html')">Chatbot</span>
    <span onclick="go('pagecourse.html')">Courses</span>
  </div>
</nav>

<div class="container">
  <h1 class="title">🚀 Career Roadmaps</h1>
  <div class="cards" id="roadmapContainer"></div>
</div>

<script>
function go(page){ window.location.href=page; }

function goToCourses(role){
  window.location.href="pagecourse.html?query="+encodeURIComponent(role);
}

function goToChatbot(role){
  window.location.href="chatbot.html?query="+encodeURIComponent(role);
}

/* ✅ NEW FUNCTION */
function openDetails(title){
  window.location.href = "roadmap-details.html?role=" + encodeURIComponent(title);
}

/* DATA */
const data = [
  {title:"Web Development",duration:"3-6 Months",level:"Beginner",progress:20,steps:["HTML","CSS","JS","React"]},
  {title:"Data Science",duration:"4-8 Months",level:"Intermediate",progress:40,steps:["Python","Pandas","ML","Visualization"]},
  {title:"AI/ML Engineer",duration:"6-12 Months",level:"Advanced",progress:10,steps:["Python","ML","DL","NLP"]},
  {title:"Cyber Security",duration:"4-7 Months",level:"Intermediate",progress:15,steps:["Networking","Linux","Hacking","Testing"]},
  {title:"Android Development",duration:"3-6 Months",level:"Beginner",progress:25,steps:["Java","UI","API","Firebase"]},
  {title:"Cloud Computing",duration:"4-8 Months",level:"Intermediate",progress:20,steps:["AWS","Docker","Kubernetes","Deploy"]}
];

const container=document.getElementById("roadmapContainer");

let saved=JSON.parse(localStorage.getItem("roadmapProgress"))||{};
let ticks=JSON.parse(localStorage.getItem("roadmapTicks"))||{};

function getWidth(bar){
  return parseInt(bar.style.width)||0;
}

function saveProgress(index,value){
  let p=JSON.parse(localStorage.getItem("roadmapProgress"))||{};
  p[index]=value;
  localStorage.setItem("roadmapProgress",JSON.stringify(p));

  let avg=Object.values(p).length
    ? Math.floor(Object.values(p).reduce((a,b)=>a+b,0)/Object.values(p).length)
    :0;

  localStorage.setItem("dashboardData",JSON.stringify({progress:avg}));
}

function saveTicks(){
  localStorage.setItem("roadmapTicks",JSON.stringify(ticks));
}

/* 25% LOGIC */
function toggleStep(el,index,stepIndex){
  event.stopPropagation();

  let bar=document.getElementById(`bar-${index}`);
  let v=getWidth(bar);

  ticks[index]=ticks[index]||{};
  let done=ticks[index][stepIndex];

  if(done){
    ticks[index][stepIndex]=false;
    el.querySelector(".tick").style.display="none";
    v -= 25;
  }else{
    ticks[index][stepIndex]=true;
    el.querySelector(".tick").style.display="inline";
    v += 25;
  }

  if(v<0) v=0;
  if(v>100) v=100;

  bar.style.width=v+"%";
  saveProgress(index,v);
  saveTicks();
}

/* CREATE CARDS */
data.forEach((r,index)=>{
  const card=document.createElement("div");
  card.className="card";

  let value=saved[index]??r.progress;
  ticks[index]=ticks[index]||{};

  card.innerHTML=`
    <h2 onclick="openDetails('${r.title}')" style="cursor:pointer;">
      ${r.title}
    </h2>

    <div class="duration">⏳ ${r.duration}</div>
    <div class="level">🎯 ${r.level}</div>

    <div class="progress">
      <div class="progress-bar" id="bar-${index}" style="width:${value}%"></div>
    </div>

    <ul class="steps">
      ${r.steps.map((s,i)=>`
        <li onclick="toggleStep(this,${index},${i})">
          ${s}
          <span class="tick" style="float:right;display:${ticks[index][i]?'inline':'none'};">✔️</span>
        </li>`).join("")}
    </ul>

    <div class="btn-group">
      <button class="btn chat-btn" onclick="event.stopPropagation();goToChatbot('${r.title}')">🤖 Chatbot</button>
      <button class="btn course-btn" onclick="event.stopPropagation();goToCourses('${r.title}')">📚 Courses</button>
    </div>

    <div class="btn-group">
      <button class="btn reset-btn" onclick="event.stopPropagation();reset(${index})">🔄 Reset</button>
    </div>
  `;

  container.appendChild(card);
});

/* RESET */
function reset(i){
  document.getElementById(`bar-${i}`).style.width="0%";
  saveProgress(i,0);

  ticks[i]={};
  saveTicks();

  document.querySelectorAll(`#roadmapContainer .card:nth-child(${i+1}) .tick`)
    .forEach(t=>t.style.display="none");
}
</script>

</body>
</html>
