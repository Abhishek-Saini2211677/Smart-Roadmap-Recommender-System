<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Pilot - Roadmaps</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1b2b5a, #0f1e3f);
  color: #fff;
}

/* Glow effect */
body::before {
  content: "";
  position: fixed;
  width: 300px;
  height: 300px;
  background: #CDAA80;
  filter: blur(140px);
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0.25;
  z-index: 0;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 18px 50px;
  background: rgba(0,0,0,0.3);
  position: relative;
  z-index: 1;
}

nav a {
  color: #fff;
  text-decoration: none;
  font-size: 1.5rem;
  font-weight: 600;
}

.nav-links {
  display: flex;
  gap: 25px;
}

.nav-links span {
  cursor: pointer;
  transition: 0.3s;
}

.nav-links span:hover {
  color: #CDAA80;
  transform: translateY(-2px);
}

/* Container */
.container {
  padding: 40px;
  text-align: center;
  position: relative;
  z-index: 1;
}

.title {
  font-size: 2.5rem;
  margin-bottom: 30px;
}

/* Cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap: 20px;
}

/* 🔥 GLASS CARD */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 15px;

  padding: 20px;
  text-align: left;

  transition: all 0.35s ease;
}

/* 🔥 HOVER EFFECT */
.card:hover {
  transform: translateY(-10px) scale(1.02);

  box-shadow: 
    0 10px 30px rgba(0,0,0,0.4),
    0 0 20px rgba(205,170,128,0.3);

  border: 1px solid rgba(205,170,128,0.6);
}

/* Tags */
.duration, .level {
  background: #CDAA80;
  color: #0F1E3F;
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 0.8rem;
  display: inline-block;
  margin-right: 5px;
  margin-bottom: 10px;
}

/* Progress */
.progress {
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  height: 8px;
  margin-bottom: 15px;
}

.progress-bar {
  height: 100%;
  background: #CDAA80;
  width: 0%;
}

/* Steps */
.steps {
  list-style: none;
  padding: 0;
}

.steps li {
  margin: 8px 0;
  padding: 8px;
  background: #997953;
  border-radius: 8px;
  color: #0F1E3F;
  cursor: pointer;
  transition: 0.3s;
}

.steps li:hover {
  transform: scale(1.05);
}

/* Buttons */
.btn-group {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(205,170,128,0.6);
}

.chat-btn {
  background: #CDAA80;
  color: #0F1E3F;
}

.course-btn {
  background: #fff;
  color: #213A56;
}

.reset-btn {
  background: #ff6b6b;
  color: #fff;
}
</style>
</head>

<body>

<script>
const user = localStorage.getItem("careerpilotUser");
if (!user) {
  window.location.replace("signinlogin.html#login");
}
</script>

<nav>
  <a href="home.html"><i class="fas fa-compass"></i> Career Pilot</a>

  <div class="nav-links">
    <span onclick="go('dashboard.html')">Dashboard</span> <!-- ✅ ADDED -->
    <span onclick="go('chatbot.html')">Chatbot</span>
    <span onclick="go('pagecourse.html')">Courses</span>
  </div>
</nav>

<div class="container">
  <h1 class="title">🚀 Career Roadmaps</h1>
  <div class="cards" id="roadmapContainer"></div>
</div>

<script>
function go(page) {
  window.location.href = page;
}

function goToCourses(role) {
  window.location.href = "pagecourse.html?query=" + encodeURIComponent(role);
}

function goToChatbot(role) {
  window.location.href = "chatbot.html?query=" + encodeURIComponent(role);
}

const data = [
  {
    title: "Web Development",
    duration: "3 - 6 Months",
    level: "Beginner",
    progress: 20,
    steps: ["HTML", "CSS", "JavaScript", "React", "Node.js"]
  },
  {
    title: "Data Science",
    duration: "4 - 8 Months",
    level: "Intermediate",
    progress: 40,
    steps: ["Python", "Pandas", "Visualization", "Machine Learning"]
  },
  {
    title: "AI/ML Engineer",
    duration: "6 - 12 Months",
    level: "Advanced",
    progress: 10,
    steps: ["Python", "ML", "Deep Learning", "NLP"]
  }
];

const container = document.getElementById("roadmapContainer");

/* LOAD SAVED */
let saved = JSON.parse(localStorage.getItem("roadmapProgress")) || {};

data.forEach((r, index) => {
  let value = saved[index] ?? r.progress;

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <h2>${r.title}</h2>

    <div class="duration">⏳ ${r.duration}</div>
    <div class="level">🎯 ${r.level}</div>

    <div class="progress">
      <div class="progress-bar" id="bar-${index}" style="width:${value}%"></div>
    </div>

    <ul class="steps">
      ${r.steps.map(s => `
        <li onclick="increaseProgress(${index})"
            oncontextmenu="decreaseProgress(event, ${index})">
          <i class="fas fa-check-circle"></i> ${s}
        </li>
      `).join("")}
    </ul>

    <div class="btn-group">
      <button class="btn chat-btn" onclick="goToChatbot('${r.title}')">🤖 Chatbot</button>
      <button class="btn course-btn" onclick="goToCourses('${r.title}')">📚 Courses</button>
    </div>

    <div class="btn-group">
      <button class="btn reset-btn" onclick="resetProgress(${index})">🔄 Reset</button>
    </div>
  `;

  container.appendChild(card);
});

/* SAVE + DASHBOARD */
function saveProgress(index, value) {
  let p = JSON.parse(localStorage.getItem("roadmapProgress")) || {};
  p[index] = value;
  localStorage.setItem("roadmapProgress", JSON.stringify(p));

  let values = Object.values(p);
  let avg = values.length ? Math.floor(values.reduce((a,b)=>a+b,0)/values.length) : 0;

  localStorage.setItem("dashboardData", JSON.stringify({ progress: avg }));
}

/* FUNCTIONS */
function increaseProgress(index) {
  const bar = document.getElementById(`bar-${index}`);
  let current = parseInt(bar.style.width);

  if (current < 100) {
    current += 10;
    bar.style.width = current + "%";
    saveProgress(index, current);
  }
}

function decreaseProgress(e, index) {
  e.preventDefault();
  const bar = document.getElementById(`bar-${index}`);
  let current = parseInt(bar.style.width);

  if (current > 0) {
    current -= 10;
    bar.style.width = current + "%";
    saveProgress(index, current);
  }
}

function resetProgress(index) {
  document.getElementById(`bar-${index}`).style.width = "0%";
  saveProgress(index, 0);
}
</script>

</body>
</html>
